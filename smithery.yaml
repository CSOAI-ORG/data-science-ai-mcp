name: data-science-ai-mcp
description: 'ML/Data Science toolkit: feature importance ranking, model comparison,
  dataset profiling, correlatio'
version: 1.0.0
tools:
- name: feature_importance
  description: Rank features by estimated importance for a prediction task.
  parameters:
  - name: features
    type: array
    required: true
  - name: target_type
    type: string
    required: false
  - name: method
    type: string
    required: false
- name: model_comparison
  description: Compare ML models across metrics. Returns composite scores, speed
  parameters:
  - name: models
    type: array
    required: true
  - name: task_type
    type: string
    required: false
- name: dataset_profiler
  description: 'Profile a dataset: completeness, quality issues, type distribution,'
  parameters:
  - name: columns
    type: array
    required: true
  - name: row_count
    type: integer
    required: false
  - name: sample_values
    type: object
    required: false
- name: correlation_finder
  description: Compute pairwise Pearson correlations between variables. Flags strong
  parameters:
  - name: variables
    type: array
    required: true
- name: visualization_recommender
  description: Recommend visualizations based on data characteristics and analysis
    goal.
  parameters:
  - name: data_description
    type: object
    required: true
